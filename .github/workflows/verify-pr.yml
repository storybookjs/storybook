name: PR Verification Harness
on:
  pull_request_target:
    types: [labeled, synchronize]
    paths-ignore: ['docs/**', '**/*.md', '.github/**']

jobs:
  verify:
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ci:verify')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    concurrency:
      group: verify-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - name: Check actor permission
        uses: prince-chrismc/check-actor-permissions-action@d504e74ba31658f4cdf4fcfeb509d4c09736d88e # v3.0.2
        with:
          permission: write
      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install
        with:
          install-code-deps: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Fetch PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate bundle
        run: yarn verify-pr-generate --pr ${{ github.event.pull_request.number }} --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Author recipe
        run: |
          # shellcheck disable=SC2012
          BUNDLE=$(ls -t .verify-output/*/prompt-bundle.json | head -1)
          yarn verify-pr-author --bundle "$BUNDLE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Checkout PR head (untrusted execution context)
        # Manual git clone instead of actions/checkout because the repo carries
        # gitlinks (.external/addon-svelte-csf etc.) without a .gitmodules file,
        # which breaks actions/checkout's submodule-foreach cleanup pass under
        # persist-credentials: false. The manual clone never writes auth into
        # pr-head/.git, preserving the same security posture as
        # persist-credentials: false.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git -c protocol.version=2 clone \
            --no-tags --no-checkout --filter=blob:none \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" \
            pr-head
          cd pr-head
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "$PR_HEAD_SHA"
          git checkout --force "$PR_HEAD_SHA"
          git remote set-url origin "https://github.com/${REPO}.git"
          git config --local --unset-all credential.helper 2>/dev/null || true

      - name: Spec precheck
        id: spec_precheck
        uses: ./.github/actions/verify-spec-precheck
        with:
          pr-number: ${{ github.event.pull_request.number }}
          head-checkout-path: pr-head

      - name: Verify PR
        if: steps.spec_precheck.outputs.spec-present == 'true'
        working-directory: pr-head
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Force Nx to run locally — the fork harness firetest runs without
          # Nx Cloud org auth, and the Verify step does not need distributed
          # cache. Upstream CI behaviour is unaffected (other steps that
          # already use Nx Cloud auth continue to do so).
          NX_NO_CLOUD: 'true'
          NX_CLOUD_ACCESS_TOKEN: ''
        run: |
          set -euo pipefail
          yarn install --immutable
          yarn nx run-many -t compile -p core,cli,create-storybook
          yarn verify-pr --recipe-spec ".verify-recipes/pr-${PR_NUMBER}.spec.ts"

      - name: Read verdict
        id: verdict
        if: always() && steps.spec_precheck.outputs.spec-present == 'true'
        run: |
          set -euo pipefail
          RESULT=""
          if compgen -G "pr-head/.verify-output/*/verify-result.json" >/dev/null; then
            RESULT=$(ls -t pr-head/.verify-output/*/verify-result.json | head -1)
          fi
          if [ -n "$RESULT" ]; then
            VERDICT=$(jq -r '.verdict' "$RESULT")
            echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
            echo "verdict: $VERDICT" >> "$GITHUB_STEP_SUMMARY"
            jq -r '"target=\(.template) regressionReason=\(.regressionReason // "n/a")"' "$RESULT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "verdict=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply verified-by-harness label
        if: steps.verdict.outputs.verdict == 'verified'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-label verified-by-harness

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-output-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: pr-head/.verify-output/
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14
      - name: Post PR comment
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body;
            try {
              if (process.env.SPEC_PRESENT === 'false') {
                body = `## Verify Harness\n\nVerdict: \`not-applicable\` for PR \`${context.issue.number}\`. Either:\n- no spec authored this run — re-fire \`ci:verify\` after running the verify-recipe-author skill, or\n- a spec was authored locally but not yet committed at head — commit \`pr-${context.issue.number}.spec.ts\` and push.\n\nSee [run log](${url}).`;
                await github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body });
                return;
              }
              const root = 'pr-head/.verify-output';
              const dirs = fs.existsSync(root)
                ? fs.readdirSync(root, { withFileTypes: true })
                    .filter((d) => d.isDirectory())
                    .map((d) => d.name)
                    .sort()
                    .reverse()
                : [];
              const resultPath = dirs
                .map((d) => path.join(root, d, 'verify-result.json'))
                .find((p) => fs.existsSync(p));
              if (!resultPath) {
                body = `## Verify Harness\n\nNo verdict produced (workflow failed before harness ran). See [run log](${url}).`;
              } else {
                const verdict = JSON.parse(fs.readFileSync(resultPath, 'utf-8'));
                body = `## Verify Harness\n\nVerdict: \`${verdict.verdict}\` (target \`${verdict.template}\`)${verdict.regressionReason ? `\n\nReason: \`${verdict.regressionReason}\`` : ''}\n\nReplay: \`npx playwright show-trace\` on the trace.zip in [artifacts](${url}/artifacts).`;
              }
            } catch (err) {
              body = `## Verify Harness\n\nError reading verdict: \`${err.message}\`. See [run log](${url}).`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
