name: PR Verification Harness
on:
  pull_request_target:
    types: [labeled, synchronize]
    paths-ignore: ['docs/**', '**/*.md', '.github/**']

jobs:
  verify:
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ci:verify')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    concurrency:
      group: verify-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      pull-requests: write
      issues: write
      statuses: write
      contents: write   # needed to push screenshots to the _verify-screenshots side branch
    steps:
      - name: Check actor permission
        uses: prince-chrismc/check-actor-permissions-action@d504e74ba31658f4cdf4fcfeb509d4c09736d88e # v3.0.2
        with:
          permission: write
      - name: Checkout base
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install
        with:
          install-code-deps: true
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Fetch PR diff
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate bundle
        run: yarn verify-pr-generate --pr ${{ github.event.pull_request.number }} --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Author recipe
        run: |
          # shellcheck disable=SC2012
          BUNDLE=$(ls -t .verify-output/*/prompt-bundle.json | head -1)
          yarn verify-pr-author --bundle "$BUNDLE"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Checkout PR head (untrusted execution context)
        # Manual git clone instead of actions/checkout because the repo carries
        # gitlinks (.external/addon-svelte-csf etc.) without a .gitmodules file,
        # which breaks actions/checkout's submodule-foreach cleanup pass under
        # persist-credentials: false. The manual clone never writes auth into
        # pr-head/.git, preserving the same security posture as
        # persist-credentials: false.
        #
        # Cloning into $RUNNER_TEMP (outside the base checkout tree) so that
        # nx / yarn / jiti module resolution inside pr-head never walks up
        # into the base checkout's node_modules — that escape was the round-3
        # / round-4 failure mode (eslint-plugin prebuild resolved
        # `storybook/csf` to the base copy, which has no `dist/csf` yet).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          PR_HEAD_DIR: ${{ runner.temp }}/pr-head
        run: |
          set -euo pipefail
          git -c protocol.version=2 clone \
            --no-tags --no-checkout --filter=blob:none \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git" \
            "$PR_HEAD_DIR"
          cd "$PR_HEAD_DIR"
          git -c protocol.version=2 fetch --no-tags --depth=1 origin "$PR_HEAD_SHA"
          git checkout --force "$PR_HEAD_SHA"
          git remote set-url origin "https://github.com/${REPO}.git"
          git config --local --unset-all credential.helper 2>/dev/null || true

      - name: Spec precheck
        id: spec_precheck
        uses: ./.github/actions/verify-spec-precheck
        with:
          pr-number: ${{ github.event.pull_request.number }}
          head-checkout-path: ${{ runner.temp }}/pr-head

      - name: Verify PR
        if: steps.spec_precheck.outputs.spec-present == 'true'
        working-directory: ${{ runner.temp }}/pr-head
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Force Nx to run locally — the fork harness firetest runs without
          # Nx Cloud org auth, and the Verify step does not need distributed
          # cache. Upstream CI behaviour is unaffected (other steps that
          # already use Nx Cloud auth continue to do so).
          NX_NO_CLOUD: 'true'
          NX_CLOUD_ACCESS_TOKEN: ''
        run: |
          set -euo pipefail
          yarn install --immutable
          # Install the Playwright chromium browser binary on the runner
          # (the GitHub-hosted ubuntu-22.04 image does not pre-bundle
          # @playwright/test browsers).
          yarn playwright install --with-deps chromium
          # Compile core FIRST so eslint-plugin's prebuild script (which
          # imports from `storybook/csf` via jiti) can resolve
          # `storybook/dist/csf/index.js`. nx run-many parallelises by
          # default and does not topo-order compile targets unless an
          # explicit `dependsOn: ["^compile"]` is set, which the repo
          # currently lacks for the eslint-plugin chain.
          yarn nx compile core
          # Then compile every other NX project so the internal-ui dev
          # server can resolve @storybook/react-vite + every addon
          # listed in code/.storybook/main.ts.
          yarn nx run-many -t compile
          yarn verify-pr --recipe-spec ".verify-recipes/pr-${PR_NUMBER}.spec.ts"

      - name: Read verdict
        id: verdict
        if: always() && steps.spec_precheck.outputs.spec-present == 'true'
        env:
          PR_HEAD_DIR: ${{ runner.temp }}/pr-head
        run: |
          set -euo pipefail
          RESULT=""
          if compgen -G "$PR_HEAD_DIR/.verify-output/*/verify-result.json" >/dev/null; then
            RESULT=$(ls -t "$PR_HEAD_DIR"/.verify-output/*/verify-result.json | head -1)
          fi
          if [ -n "$RESULT" ]; then
            VERDICT=$(jq -r '.verdict' "$RESULT")
            echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
            echo "verdict: $VERDICT" >> "$GITHUB_STEP_SUMMARY"
            jq -r '"target=\(.template) regressionReason=\(.regressionReason // "n/a")"' "$RESULT" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "verdict=missing" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply verified-by-harness label
        if: steps.verdict.outputs.verdict == 'verified'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure the label exists on the repo (idempotent — `gh label create`
          # exits non-zero if the label already exists, which we swallow).
          gh label create verified-by-harness \
            --repo ${{ github.repository }} \
            --description "Verified by PR Verify Harness" \
            --color 0E8A16 \
            2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --add-label verified-by-harness

      - name: Push screenshots to side branch
        id: screenshots
        if: always() && steps.verdict.outputs.verdict != '' && steps.verdict.outputs.verdict != 'missing'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_HEAD_DIR: ${{ runner.temp }}/pr-head
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          SOURCE="$PR_HEAD_DIR/.verify-output"
          if ! find "$SOURCE" -name '*.png' -print -quit | grep -q .; then
            echo "no screenshots produced — skipping side-branch push"
            echo "urls=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ASSETS_DIR="$RUNNER_TEMP/verify-assets"
          AUTH_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.git"

          # Try cloning the existing side branch; if it doesn't exist yet,
          # create an orphan branch with a single empty commit.
          if git -c protocol.version=2 clone --depth 1 --branch _verify-screenshots \
              "$AUTH_URL" "$ASSETS_DIR" 2>/dev/null; then
            echo "cloned existing _verify-screenshots branch"
          else
            echo "side branch missing — creating orphan _verify-screenshots"
            git -c protocol.version=2 clone --depth 1 "$AUTH_URL" "$ASSETS_DIR"
            (
              cd "$ASSETS_DIR"
              git -c user.email=actions@github.com -c user.name="github-actions[bot]" \
                checkout --orphan _verify-screenshots
              git rm -rf . >/dev/null
              echo "Verify harness screenshot store. Auto-managed; do not edit." > README.md
              git add README.md
              git -c user.email=actions@github.com -c user.name="github-actions[bot]" \
                commit -m "chore: init _verify-screenshots branch"
              git push origin _verify-screenshots
            )
          fi

          PR_DIR="$ASSETS_DIR/pr-${PR_NUMBER}/${RUN_ID}"
          rm -rf "$ASSETS_DIR/pr-${PR_NUMBER}/${RUN_ID}"
          mkdir -p "$PR_DIR"

          # Copy each runId/<spec-slug>/<file>.png preserving the structure
          # under the run directory.
          (
            cd "$SOURCE"
            find . -name '*.png' -print0
          ) | while IFS= read -r -d '' rel; do
            dest="$PR_DIR/${rel#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$SOURCE/$rel" "$dest"
          done

          cd "$ASSETS_DIR"
          git add "pr-${PR_NUMBER}/${RUN_ID}"
          if git diff --cached --quiet; then
            echo "no new screenshots to commit"
            echo "urls=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git -c user.email=actions@github.com -c user.name="github-actions[bot]" \
            commit -m "verify: PR #${PR_NUMBER} run ${RUN_ID}"
          git push origin _verify-screenshots
          COMMIT_SHA=$(git rev-parse HEAD)

          # Emit JSON array of { rel, url } for each PNG, where url is the
          # raw.githubusercontent.com URL pinned at the commit we just pushed.
          URLS=$(
            cd "$ASSETS_DIR/pr-${PR_NUMBER}/${RUN_ID}"
            find . -name '*.png' \
              | sed "s|^\./||" \
              | jq -R --arg base "https://raw.githubusercontent.com/${REPO}/${COMMIT_SHA}/pr-${PR_NUMBER}/${RUN_ID}" \
                  '{ rel: ., url: ($base + "/" + .) }' \
              | jq -s .
          )
          echo "urls<<EOF" >> "$GITHUB_OUTPUT"
          echo "$URLS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-output-pr-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: ${{ runner.temp }}/pr-head/.verify-output/
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 14
      - name: Post PR comment
        if: always()
        env:
          PR_HEAD_DIR: ${{ runner.temp }}/pr-head
          SCREENSHOT_URLS: ${{ steps.screenshots.outputs.urls }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const url = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            function renderScreenshots() {
              let raw = process.env.SCREENSHOT_URLS;
              if (!raw || raw.trim() === '' || raw.trim() === '[]') return '';
              let items;
              try {
                items = JSON.parse(raw);
              } catch {
                return '';
              }
              if (!Array.isArray(items) || items.length === 0) return '';
              const blocks = items.map(
                (it) => `### \`${it.rel}\`\n\n![${it.rel}](${it.url})\n`,
              );
              return `\n\n## Screenshots\n\n${blocks.join('\n')}`;
            }

            let body;
            try {
              if (process.env.SPEC_PRESENT === 'false') {
                body = `## Verify Harness\n\nVerdict: \`not-applicable\` for PR \`${context.issue.number}\`. Either:\n- no spec authored this run — re-fire \`ci:verify\` after running the verify-recipe-author skill, or\n- a spec was authored locally but not yet committed at head — commit \`pr-${context.issue.number}.spec.ts\` and push.\n\nSee [run log](${url}).`;
                await github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body });
                return;
              }
              const root = path.join(process.env.PR_HEAD_DIR || 'pr-head', '.verify-output');
              const dirs = fs.existsSync(root)
                ? fs.readdirSync(root, { withFileTypes: true })
                    .filter((d) => d.isDirectory())
                    .map((d) => d.name)
                    .sort()
                    .reverse()
                : [];
              const resultPath = dirs
                .map((d) => path.join(root, d, 'verify-result.json'))
                .find((p) => fs.existsSync(p));
              if (!resultPath) {
                body = `## Verify Harness\n\nNo verdict produced (workflow failed before harness ran). See [run log](${url}).`;
              } else {
                const verdict = JSON.parse(fs.readFileSync(resultPath, 'utf-8'));
                body = `## Verify Harness\n\nVerdict: \`${verdict.verdict}\` (target \`${verdict.template}\`)${verdict.regressionReason ? `\n\nReason: \`${verdict.regressionReason}\`` : ''}\n\nReplay: \`npx playwright show-trace\` on the trace.zip in [artifacts](${url}/artifacts).${renderScreenshots()}`;
              }
            } catch (err) {
              body = `## Verify Harness\n\nError reading verdict: \`${err.message}\`. See [run log](${url}).`;
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
