name: QA
run-name: "QA run-many e2e-tests-dev"

on:
  push:
    branches:
      - kasper/stabilize-onboarding-e2e-waits

permissions:
  actions: read
  contents: read
  statuses: write

env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  qa:
    name: Run all merged e2e-tests-dev targets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install
        with:
          install-code-deps: true

      - name: Install Playwright Dependencies
        run: cd code && yarn exec playwright install chromium --with-deps

      - name: Start Nx Cloud distributed run
        run: >
          npx nx@latest start-ci-run
          --distribute-on="./.nx/workflows/distribution-config.yaml"
          --stop-agents-after="e2e-tests-dev"

      - id: nx
        name: Run nx
        run: |
          yarn nx run-many -t e2e-tests-dev -c production -p="tag:library,tag:ci:merged" --skip-nx-cache | tee nx-output.log
          status=${PIPESTATUS[0]}
          nx_cloud_run=$(grep -o 'https://cloud\.nx\.app/runs/[A-Za-z0-9]\+' nx-output.log | tail -n 1 || true)
          echo "nx_cloud_run=${nx_cloud_run}" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Write summary
        if: always()
        run: |
          {
            echo "## QA Summary"
            echo
            echo "- Target: \`run-many -t e2e-tests-dev -c production -p=tag:library,tag:ci:merged\`"
            if [ -n "${{ steps.nx.outputs.nx_cloud_run }}" ]; then
              echo "- Nx Cloud: ${{ steps.nx.outputs.nx_cloud_run }}"
            fi
            echo
            echo "### Failed tasks"
            grep '✖' nx-output.log || echo "No failed tasks found in nx-output.log"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nx log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-nx-output
          path: nx-output.log
          retention-days: 7

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: qa-failure-artifacts
          path: |
            test-results
            code/playwright-results
          if-no-files-found: ignore
          retention-days: 7
