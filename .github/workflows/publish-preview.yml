name: Publish Preview Packages
run-name: Publish preview packages for PR #${{ github.event.pull_request.number }}

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

env:
  PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD: 1

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish-preview:
    name: Publish preview packages
    if: |
      (github.event.action == 'labeled' && contains(fromJSON('["ci:normal","ci:merged","ci:daily"]'), github.event.label.name)) ||
      (github.event.action != 'labeled' && (
        contains(github.event.pull_request.labels.*.name, 'ci:normal') ||
        contains(github.event.pull_request.labels.*.name, 'ci:merged') ||
        contains(github.event.pull_request.labels.*.name, 'ci:daily')
      ))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request HEAD
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install
        with:
          install-code-deps: true

      - name: Build publishable packages
        working-directory: code
        run: yarn task --task compile --start-from=auto --no-link

      - name: Publish preview packages with pkg.pr.new
        id: publish
        working-directory: scripts
        run: |
          rm -f ./pkg-pr-new-output.json

          yarn workspaces list --json --no-private \
            | jq -j '"../" + .location + "\u0000"' \
            | xargs -0 -r yarn pkg-pr-new publish --no-template --comment=off --commentWithDev --json=./pkg-pr-new-output.json

          test -s ./pkg-pr-new-output.json

      - name: Build preview PR body
        id: preview-body
        working-directory: scripts
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          RUN_ID: ${{ github.run_id }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          WORKFLOW_REPOSITORY: ${{ github.repository }}
        run: |
          primary_package_name=$(jq -r '.packages[] | select(.name == "storybook") | .name' ./pkg-pr-new-output.json)
          primary_package_url=$(jq -r '.packages[] | select(.name == "storybook") | .url' ./pkg-pr-new-output.json)

          if [[ -z "$primary_package_name" || -z "$primary_package_url" ]]; then
            primary_package_name=$(jq -r '.packages[0].name' ./pkg-pr-new-output.json)
            primary_package_url=$(jq -r '.packages[0].url' ./pkg-pr-new-output.json)
          fi

          package_count=$(jq '.packages | length' ./pkg-pr-new-output.json)
          package_rows=$(jq -r '.packages | sort_by(.name) | map("| [\(.name)](\(.url)) | [pkg.pr.new](\(.url)) | \(.shasum) |") | join("\n")' ./pkg-pr-new-output.json)
          short_sha=$(printf '%s' "$COMMIT_SHA" | cut -c 1-8)
          date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          timestamp=$(date -u '+%s')

          echo 'body<<EOF' >> "$GITHUB_OUTPUT"
          cat <<EOF >> "$GITHUB_OUTPUT"
          This pull request has been released as preview packages. Try it out in a new sandbox or an existing project with the published [$primary_package_name]($primary_package_url) package.
          <details>
          <summary>More information</summary>

          | | |
          | --- | --- |
          | **Primary package** | [$primary_package_name]($primary_package_url) |
          | **Published packages** | $package_count |
          | **Triggered by** | @$TRIGGERING_ACTOR |
          | **Repository** | [$REPOSITORY](https://github.com/$REPOSITORY) |
          | **Branch** | [$BRANCH](https://github.com/$REPOSITORY/tree/$BRANCH) |
          | **Commit** | [$short_sha](https://github.com/$REPOSITORY/commit/$COMMIT_SHA) |
          | **Datetime** | $date ($timestamp) |
          | **Workflow run** | [$RUN_ID](https://github.com/$WORKFLOW_REPOSITORY/actions/runs/$RUN_ID) |

          To request a new preview release of this pull request, mention the @storybookjs/core team.

          | Package | Preview URL | Shasum |
          | --- | --- | --- |
          $package_rows
          </details>
          EOF
          echo 'EOF' >> "$GITHUB_OUTPUT"

      - name: Replace Pull Request Body
        id: replace-pr-body
        continue-on-error: ${{ github.event.pull_request.head.repo.fork }}
        uses: ivangabriele/find-and-replace-pull-request-body@042438c6cbfbacf6a4701d6042f59b1f73db2fd8
        with:
          githubToken: ${{ github.token }}
          find: "CANARY_RELEASE_SECTION"
          isHtmlCommentTag: true
          replace: ${{ steps.preview-body.outputs.body }}

      - name: Create failing comment on PR
        if: ${{ failure() && steps.replace-pr-body.outcome != 'failure' }}
        continue-on-error: ${{ github.event.pull_request.head.repo.fork }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          TRIGGERING_ACTOR: ${{ github.triggering_actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$REPOSITORY" \
            --body "Failed to publish preview packages for this pull request, triggered by @$TRIGGERING_ACTOR. See the failed workflow run at: https://github.com/$REPOSITORY/actions/runs/$RUN_ID"
