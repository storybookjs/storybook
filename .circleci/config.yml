version: 2.1

# https://circleci.com/docs/guides/orchestrate/dynamic-config/
setup: true

orbs:
  git-shallow-clone: guitarrapc/git-shallow-clone@2.8.0
  continuation: circleci/continuation@2.0.1
  node: circleci/node@7.2.1

parameters:
  ghBaseBranch:
    default: next
    description: The name of the base branch (the target of the PR)
    type: string
  ghPrNumber:
    default: ''
    description: The PR number
    type: string
  ghTrustedAuthor:
    default: 'false'
    description: Whether the PR author is a trusted author who should be allowed to persist to shared caches
    type: string
  workflow:
    default: skipped
    description: >-
      Which workflow to run: a single workflow (normal, merged, daily, docs, core), or a
      `+`-separated list of sandbox-split atoms (a framework such as react/vue3/angular, or a
      builder such as vite/webpack), e.g. "core+react". Validated by scripts/ci/main.ts.
    type: string

jobs:
  generate-and-run-config:
    executor:
      name: node/default
      resource_class: large
    steps:
      - node/install:
          install-yarn: true
      - git-shallow-clone/checkout_advanced:
          clone_options: '--depth 1'
      - run:
          name: Install dependencies
          command: yarn workspaces focus @storybook/scripts
      - run:
          name: Generate config
          command: |
            yarn dlx jiti ./scripts/ci/main.ts \
              --workflow=<< pipeline.parameters.workflow >> \
              --gh-trusted-author=<< pipeline.parameters.ghTrustedAuthor >>
      - continuation/continue:
          configuration_path: .circleci/config.generated.yml
workflows:
  setup:
    jobs:
      - generate-and-run-config
    when: pipeline.parameters.workflow != "skipped"
