name: Copilot Verification

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  terminal-output-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js and Install Dependencies
        uses: ./.github/actions/setup-node-and-install
        with:
          install-code-deps: true

      - name: Compile packages
        run: yarn nx run-many --targets compile -c production

      - name: Generate required sandboxes
        run: |
          echo "🏗️  Generating sandboxes for terminal output verification..."
          yarn nx sandbox react-vite-default -c production
          yarn nx sandbox react-webpack-18 -c production

      - name: Check terminal output baselines and run capture
        run: |
          set +e
          failed=0
          
          # Mapping from builder names to sandbox directories
          declare -A builder_to_sandbox=(
            [builder-vite]="react-vite-default-ts"
            [builder-webpack5]="react-webpack-18-ts"
          )
          
          for builder in builder-vite builder-webpack5; do
            snapshot_file="scripts/terminal-output-snapshots/${builder}-build.snap.txt"
            sandbox_dir="../storybook-sandboxes/${builder_to_sandbox[$builder]}"
            
            if grep -q "PLACEHOLDER" "$snapshot_file"; then
              echo "ℹ️  Baseline snapshots are placeholders — skipping terminal output comparison for $builder."
              echo "   Run \`yarn capture-terminal-output --builder $builder --update\` to seed real baselines."
            else
              # Check if the required sandbox directory exists
              if [ ! -d "$sandbox_dir" ]; then
                echo "❌ Sandbox directory not found for $builder at '$sandbox_dir'"
                echo "   This is unexpected - sandbox generation should have created it."
                failed=1
              else
                echo "🔍 Comparing terminal output for $builder..."
                if ! yarn capture-terminal-output --builder "$builder"; then
                  echo "❌ Terminal output comparison failed for $builder"
                  failed=1
                fi
              fi
            fi
          done
          
          if [ $failed -eq 1 ]; then
            exit 1
          fi