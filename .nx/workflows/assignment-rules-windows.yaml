distribute-on:
  default: 3 windows-latest
assignment-rules:
  - targets:
      - compile
    projects:
      - core
    run-on:
      - agent: windows-latest
        parallelism: 1
  - targets:
      - compile
    run-on:
      - agent: windows-latest
        parallelism: 1
  - targets:
      - '*'
    run-on:
      - agent: windows-latest
        parallelism: 1
