name: mvc-assess

# Initial release: only `workflow_dispatch` is active so a maintainer can
# trigger an assessment for a specific PR from the Actions UI. Uncomment the
# `pull_request_target` block once the agent-skill batch path has proven the
# end-to-end flow during the testing phase.
#
# Security note: assess-mvc only reads PR metadata via the GitHub API; it
# never executes PR code. We check out the trusted base branch (never the
# fork head) so the workflow stays safe under `pull_request_target`.

permissions: {}

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to assess'
        required: true
      reassess:
        description: 'Reassess PRs that already have a verdict label'
        type: boolean
        default: false
      force:
        description: 'Bypass skip rules (drafts, maintainers, mvc:skip)'
        type: boolean
        default: false
  # pull_request_target:
  #   types:
  #     - labeled
  #     - synchronize
  #   branches:
  #     - next
  #     - main

concurrency:
  group: mvc-assess-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  assess:
    # Run when manually dispatched, OR (when the pull_request_target triggers
    # are eventually enabled) when the `mvc:pending` label is added or a PR
    # already marked `mvc:failed` gets a new commit pushed.
    if: |
      github.repository_owner == 'storybookjs' && (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'pull_request_target' &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'mvc:pending'
        ) ||
        (
          github.event_name == 'pull_request_target' &&
          github.event.action == 'synchronize' &&
          contains(github.event.pull_request.labels.*.name, 'mvc:failed')
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout (trusted base; never the fork head)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha || github.ref }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Assess MVC
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PR_NUMBER="${{ github.event.inputs.pr_number || github.event.pull_request.number }}"

          FLAGS=("--no-dry-run" "--dismiss-previous")

          # synchronize fires when new commits land on a PR that already failed
          # MVC — we want to re-evaluate it.
          if [ "${{ github.event_name }}" = "pull_request_target" ] \
             && [ "${{ github.event.action }}" = "synchronize" ]; then
            FLAGS+=("--reassess")
          fi
          if [ "${{ github.event.inputs.reassess }}" = "true" ]; then
            FLAGS+=("--reassess")
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FLAGS+=("--force")
          fi

          node scripts/sustainability/assess-mvc.ts "$PR_NUMBER" "${FLAGS[@]}"
